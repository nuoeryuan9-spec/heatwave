<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国桑拿天演变地图</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/china.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }

#app { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; }

#map-wrap {
  flex: 1; position: relative; overflow: hidden;
  animation: heatWave 4s ease-in-out infinite;
}
@keyframes heatWave {
  0%, 100% { transform: scale(1.0); }
  50% { transform: scale(1.002); }
}

#map-container { width: 100%; height: 100%; }

#steam-canvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 2;
}

/* ---- timeline ---- */
#timeline {
  height: 80px; display: flex; align-items: center; justify-content: center;
  padding: 0 40px; gap: 0; position: relative; z-index: 10;
  background: rgba(255,250,240,0.6);
  backdrop-filter: blur(6px);
  border-top: 1px solid rgba(200,150,100,0.2);
}
#play-btn {
  width: 38px; height: 38px; border-radius: 50%; border: 2px solid #EB4A23;
  background: rgba(255,250,240,0.9); cursor: pointer; display: flex;
  align-items: center; justify-content: center; margin-right: 18px;
  transition: background 0.2s; flex-shrink: 0;
}
#play-btn:hover { background: #EB4A23; }
#play-btn:hover svg { fill: #fff; }
#play-btn svg { width: 16px; height: 16px; fill: #EB4A23; }

#year-track {
  flex: 1; display: flex; align-items: center; justify-content: space-between;
  position: relative; height: 40px;
}
#year-track::before {
  content: ''; position: absolute; top: 50%; left: 0; right: 0;
  height: 2px; background: rgba(200,150,100,0.3); transform: translateY(-50%);
  z-index: 0;
}
.year-node {
  position: relative; z-index: 1; display: flex; flex-direction: column;
  align-items: center; cursor: pointer; transition: transform 0.2s;
}
.year-node:hover { transform: scale(1.15); }
.sun-icon { width: 22px; height: 22px; margin-bottom: 2px; }
.year-label {
  font-size: 11px; color: #888; font-weight: 500; transition: all 0.3s;
}
.year-node.active .sun-icon { filter: drop-shadow(0 0 4px #F7A832); }
.year-node.active .year-label {
  font-size: 14px; color: #EB4A23; font-weight: 700;
}

/* ---- side panel ---- */
#side-panel {
  position: absolute; top: 0; right: -340px; width: 320px; height: calc(100% - 80px);
  z-index: 20; background: rgba(255,250,240,0.92);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-left: 1px solid rgba(200,150,100,0.25);
  box-shadow: -4px 0 24px rgba(100,40,10,0.08);
  transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
}
#side-panel.open { right: 0; }
#panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 20px 12px; border-bottom: 1px solid rgba(200,150,100,0.15);
}
#panel-title { font-size: 20px; font-weight: 700; color: #3a1a0a; }
#panel-close {
  width: 30px; height: 30px; border-radius: 50%; border: none;
  background: rgba(200,150,100,0.15); cursor: pointer; display: flex;
  align-items: center; justify-content: center; transition: background 0.2s;
  font-size: 16px; color: #931519;
}
#panel-close:hover { background: rgba(200,150,100,0.35); }
#chart-area { flex: 1; padding: 10px 12px; min-height: 0; }
#line-chart { width: 100%; height: 100%; }

/* ---- title overlay ---- */
#map-title {
  position: absolute; top: 12px; left: 20px; z-index: 5;
  font-size: 22px; font-weight: 700; color: #3a1a0a;
  text-shadow: 0 1px 3px rgba(255,255,255,0.7);
  letter-spacing: 2px;
}
#year-display {
  position: absolute; top: 40px; left: 20px; z-index: 5;
  font-size: 42px; font-weight: 900; color: #EB4A23;
  text-shadow: 0 2px 8px rgba(235,74,35,0.2);
  opacity: 0.85;
}
</style>
</head>
<body>
<div id="app">
  <div id="map-wrap">
    <div id="map-title">中国桑拿天演变地图</div>
    <div id="year-display">2015</div>
    <div id="map-container"></div>
    <canvas id="steam-canvas"></canvas>
    <div id="side-panel">
      <div id="panel-header">
        <span id="panel-title">--</span>
        <button id="panel-close">✕</button>
      </div>
      <div id="chart-area">
        <div id="line-chart"></div>
      </div>
    </div>
  </div>
  <div id="timeline">
    <button id="play-btn">
      <svg viewBox="0 0 24 24" id="play-icon"><polygon points="6,3 20,12 6,21"/></svg>
    </button>
    <div id="year-track"></div>
  </div>
</div>

33|2025,甘肃,30|2025,福建,154|2025,西藏,37|2025,贵州,111|2025,辽宁,39|2025,重庆,106|2025,陕西,63|2025,青海,11|2025,香港,45|2025,黑龙江,33';

// Parse data
const data = {};
RAW.split('|').forEach(s => {
  const parts = s.split(',');
  const y = parts[0], p = parts[1], d = parseInt(parts[2]);
  if (!data[y]) data[y] = {};
  data[y][p] = d;
});

// All province names
const ALL_PROVINCES = Object.keys(data['2025']);

// Province center coordinates (lng, lat) for steam particles
const PROV_CENTERS = {
  '上海':[121.47,31.23],'云南':[102.71,25.05],'内蒙古':[111.75,40.84],'北京':[116.41,39.90],
  '台湾':[120.96,23.70],'吉林':[126.55,43.84],'四川':[104.07,30.67],'天津':[117.20,39.13],
  '宁夏':[106.27,38.47],'安徽':[117.28,31.86],'山东':[117.00,36.67],'山西':[112.55,37.87],
  '广东':[113.26,23.13],'广西':[108.33,22.84],'新疆':[87.62,43.83],'江苏':[118.76,32.06],
  '江西':[115.89,28.68],'河北':[114.50,38.04],'河南':[113.65,34.76],'浙江':[120.15,30.28],
  '海南':[110.35,20.02],'湖北':[114.34,30.55],'湖南':[112.98,28.19],'甘肃':[103.83,36.06],
  '福建':[119.30,26.08],'西藏':[91.11,29.97],'贵州':[106.71,26.57],'辽宁':[123.43,41.80],
  '重庆':[106.55,29.56],'陕西':[108.95,34.27],'青海':[96.78,36.62],'香港':[114.17,22.32],
  '黑龙江':[126.64,45.75]
};

let currentYear = 2015;
let playing = false;
let playTimer = null;
let selectedProvince = null;
let mapChart = null;
let lineChart = null;
let cachedPixelPositions = null;

// ===== SUN SVG ICON =====
function sunSVG(active) {
  const fill = active ? '#EB4A23' : '#c8a070';
  const r = active ? 8 : 6;
  const rays = active ? 10 : 8;
  let paths = '<circle cx="12" cy="12" r="' + r + '" fill="' + fill + '"/>';
  for (let i = 0; i < rays; i++) {
    const angle = (i * 360 / rays) * Math.PI / 180;
    const x1 = 12 + Math.cos(angle) * (r + 2);
    const y1 = 12 + Math.sin(angle) * (r + 2);
    const x2 = 12 + Math.cos(angle) * (r + (active ? 5 : 4));
    const y2 = 12 + Math.sin(angle) * (r + (active ? 5 : 4));
    paths += '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+fill+'" stroke-width="'+(active?2:1.2)+'" stroke-linecap="round"/>';
  }
  return '<svg class="sun-icon" viewBox="0 0 24 24">' + paths + '</svg>';
}

// ===== BUILD TIMELINE =====
const track = document.getElementById('year-track');
YEARS.forEach(y => {
  const node = document.createElement('div');
  node.className = 'year-node' + (y === currentYear ? ' active' : '');
  node.dataset.year = y;
  node.innerHTML = sunSVG(y === currentYear) + '<span class="year-label">' + y + '</span>';
  node.addEventListener('click', function() { goToYear(y); });
  track.appendChild(node);
});

function updateTimeline() {
  document.querySelectorAll('.year-node').forEach(n => {
    const y = parseInt(n.dataset.year);
    const isActive = y === currentYear;
    n.className = 'year-node' + (isActive ? ' active' : '');
    n.innerHTML = sunSVG(isActive) + '<span class="year-label">' + y + '</span>';
  });
}

// ===== PLAY / PAUSE =====
const playBtn = document.getElementById('play-btn');
const playIcon = document.getElementById('play-icon');

function setPlaying(val) {
  playing = val;
  if (playing) {
    playIcon.innerHTML = '<rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/>';
    playTimer = setInterval(function() {
      var idx = YEARS.indexOf(currentYear);
      idx = (idx + 1) % YEARS.length;
      goToYear(YEARS[idx]);
    }, 500);
  } else {
    playIcon.innerHTML = '<polygon points="6,3 20,12 6,21"/>';
    clearInterval(playTimer);
    playTimer = null;
  }
}

playBtn.addEventListener('click', function() { setPlaying(!playing); });

function goToYear(y) {
  currentYear = y;
  document.getElementById('year-display').textContent = y;
  updateTimeline();
  updateMap();
}

// ===== MAP INIT =====
function getMapData(year) {
  var yd = data[year];
  return ALL_PROVINCES.map(function(p) {
    return { name: p, value: yd[p] !== undefined ? yd[p] : -1 };
  });
}

function initMap() {
  mapChart = echarts.init(document.getElementById('map-container'));
  updateMap();

  mapChart.on('click', function(params) {
    if (params.componentType === 'series') {
      selectedProvince = params.name;
      highlightProvince(params.name);
      openPanel(params.name);
    }
  });

  // Cache pixel positions after map renders
  setTimeout(cachePixelPositions, 1200);

  window.addEventListener('resize', function() {
    mapChart.resize();
    if (lineChart) lineChart.resize();
    resizeSteamCanvas();
    cachePixelPositions();
  });
}

function cachePixelPositions() {
  cachedPixelPositions = {};
  if (!mapChart) return;
  ALL_PROVINCES.forEach(function(name) {
    var center = PROV_CENTERS[name];
    if (center) {
      try {
        var pixel = mapChart.convertToPixel({seriesIndex: 0}, center);
        if (pixel) cachedPixelPositions[name] = pixel;
      } catch(e) {
        // Fallback: approximate position based on container size
        var container = document.getElementById('map-container');
        var w = container.offsetWidth, h = container.offsetHeight;
        var lng = center[0], lat = center[1];
        // Simple linear mapping for China (73-135 lng, 18-54 lat)
        var px = ((lng - 73) / (135 - 73)) * w * 0.85 + w * 0.07;
        var py = ((54 - lat) / (54 - 18)) * h * 0.85 + h * 0.07;
        cachedPixelPositions[name] = [px, py];
      }
    }
  });
}

  var mapData = getMapData(currentYear);
  var option = {
    tooltip: {
      trigger: 'item',
      formatter: function(p) {
        if (p.value === -1 || p.value === undefined) return p.name + '<br/>桑拿天：暂无数据';

      backgroundColor: 'rgba(255,250,240,0.92)',
      borderColor: '#e0a060',
      textStyle: { color: '#3a1a0a' },
      cursor: 'pointer'

    visualMap: {
      min: 0,
      max: 180,
      left: 20,
      bottom: 20,
      text: ['多', '少'],

      inRange: {

      },
      calculable: true,
      orient: 'vertical',
      itemWidth: 14,
      itemHeight: 120
    },
    series: [{
      name: '桑拿天',
      type: 'map',
      map: 'china',
      roam: false,
      data: mapData,
      center: [104.5, 36],
      zoom: 1.15,
      itemStyle: {
        areaColor: '#e8e8e8',
        borderColor: '#cccccc',
        borderWidth: 1
      },
      emphasis: {
        itemStyle: {
          areaColor: '#ffd080',
          borderColor: '#e06020',
          borderWidth: 3
        },
        label: { show: false }
      },
      select: {
        itemStyle: {
          borderColor: '#e06020',
          borderWidth: 3
        }
      },
      label: { show: false }
    }]
  };
  mapChart.setOption(option, true);

  if (selectedProvince) {
    setTimeout(function() { highlightProvince(selectedProvince); }, 50);
  }
}

function highlightProvince(name) {
  mapChart.dispatchAction({ type: 'select', name: name });
}

// ===== SIDE PANEL =====
var sidePanel = document.getElementById('side-panel');
var panelTitle = document.getElementById('panel-title');
var panelClose = document.getElementById('panel-close');

panelClose.addEventListener('click', function() {
  sidePanel.classList.remove('open');
  selectedProvince = null;
  mapChart.dispatchAction({ type: 'unselect', seriesIndex: 0 });
});

function openPanel(province) {
  panelTitle.textContent = province;
  sidePanel.classList.add('open');
  setTimeout(function() { renderLineChart(province); }, 120);
}

function renderLineChart(province) {
  if (!lineChart) {
    lineChart = echarts.init(document.getElementById('line-chart'));
  }
  var seriesData = YEARS.map(function(y) { return data[y][province] !== undefined ? data[y][province] : 0; });

  var option = {
    grid: { top: 35, right: 20, bottom: 30, left: 45 },
    title: {
      text: province + ' 桑拿天天数变化',
      left: 'center',
      textStyle: { fontSize: 13, color: '#8a5a3a', fontWeight: 'normal' }
    },
    xAxis: {
      type: 'category',
      data: YEARS.map(String),
      axisLine: { lineStyle: { color: '#c8a070' } },
      axisLabel: { color: '#8a5a3a', fontSize: 10 },
      axisTick: { show: false }
    },
    yAxis: {
      type: 'value',
      name: '天数',
      nameTextStyle: { color: '#8a5a3a', fontSize: 10 },
      axisLine: { show: false },
      axisLabel: { color: '#8a5a3a', fontSize: 10 },
      splitLine: { lineStyle: { color: 'rgba(200,150,100,0.15)' } }
    },
    series: [{
      type: 'line',
      data: seriesData,
      smooth: true,
      lineStyle: { color: '#EB4A23', width: 2.5 },
      itemStyle: { color: '#931519', borderWidth: 2 },
      areaStyle: {
        color: {
          type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
          colorStops: [
            { offset: 0, color: 'rgba(235,74,35,0.25)' },
            { offset: 1, color: 'rgba(235,74,35,0.02)' }
          ]
        }
      },
      symbolSize: function(value, params) {
        var idx = params.dataIndex;
        return (idx === 0 || idx === YEARS.length - 1) ? 10 : 4;
      },
      label: {
        show: true,
        formatter: function(params) {
          var idx = params.dataIndex;
          return (idx === 0 || idx === YEARS.length - 1) ? params.value + '天' : '';
        },
        color: '#931519',
        fontWeight: 'bold',
        fontSize: 12,
        position: 'top'
      },
      animationDuration: 600
    }],
    tooltip: {
      trigger: 'axis',
      backgroundColor: 'rgba(255,250,240,0.92)',
      borderColor: '#e0a060',
      textStyle: { color: '#3a1a0a' },
      formatter: function(params) {
        return params[0].name + '年<br/>桑拿天：' + params[0].value + ' 天';
      }
    }
  };
  lineChart.setOption(option, true);
  lineChart.resize();
}

// ===== STEAM PARTICLES =====
var steamCanvas = document.getElementById('steam-canvas');
var ctx = steamCanvas.getContext('2d');
var particles = [];

function resizeSteamCanvas() {
  steamCanvas.width = steamCanvas.offsetWidth;
  steamCanvas.height = steamCanvas.offsetHeight;
}
resizeSteamCanvas();

function Particle(x, y, intensity) {
  this.x = x + (Math.random() - 0.5) * 30;
  this.y = y;
  this.originX = this.x;
  this.vy = -(0.3 + Math.random() * 0.8) * (0.5 + intensity * 0.012);
  this.vx = (Math.random() - 0.5) * 0.3;
  this.radius = 1.5 + Math.random() * 2.5;
  this.opacity = 0.12 + Math.random() * 0.18 + Math.min(intensity * 0.002, 0.15);
  this.life = 0;
  this.maxLife = 80 + Math.random() * 60;
  this.wobbleSpeed = 0.02 + Math.random() * 0.03;
  this.wobbleAmp = 1 + Math.random() * 2;
  this.currentOpacity = this.opacity;
  this.currentRadius = this.radius;
}
Particle.prototype.update = function() {
  this.life++;
  this.y += this.vy;
  this.x = this.originX + Math.sin(this.life * this.wobbleSpeed) * this.wobbleAmp;
  this.originX += this.vx * 0.1;
  var lifeRatio = this.life / this.maxLife;
  this.currentOpacity = this.opacity * (1 - lifeRatio);
  this.currentRadius = this.radius * (1 - lifeRatio * 0.3);
  return this.life < this.maxLife && this.currentOpacity > 0.01;
};
Particle.prototype.draw = function(ctx) {
  ctx.beginPath();
  ctx.arc(this.x, this.y, this.currentRadius, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,' + this.currentOpacity + ')';
  ctx.fill();
};

var frameCount = 0;
function animateSteam() {
  ctx.clearRect(0, 0, steamCanvas.width, steamCanvas.height);
  frameCount++;

  // Spawn new particles
  if (frameCount % 3 === 0 && cachedPixelPositions) {
    var yd = data[currentYear];
    ALL_PROVINCES.forEach(function(prov) {
      var days = yd[prov] || 0;
      if (days <= 0) return;
      var pos = cachedPixelPositions[prov];
      if (!pos) return;
      var count = Math.ceil(days / 40);
      for (var i = 0; i < count; i++) {
        if (Math.random() < 0.35) {
          particles.push(new Particle(pos[0], pos[1], days));
        }
      }
    });
  }

  // Limit total particles
  if (particles.length > 800) {
    particles = particles.slice(particles.length - 800);
  }

  var alive = [];
  for (var i = 0; i < particles.length; i++) {
    if (particles[i].update()) {
      particles[i].draw(ctx);
      alive.push(particles[i]);
    }
  }
  particles = alive;

  requestAnimationFrame(animateSteam);
}

// ===== INIT =====
function init() {
  initMap();
  setTimeout(function() {
    resizeSteamCanvas();
    animateSteam();
  }, 1500);
}

if (typeof echarts !== 'undefined') {
  init();
} else {
  window.addEventListener('load', init);
}
</script>
