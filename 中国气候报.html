<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>十一年高温天数变迁</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    width: 100%;
    min-height: 100vh;
    padding: 24px;
    color: #5D3A1A;
  }
  .chart-container {
    background: transparent;
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
  }
  .header {
    text-align: center;
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    color: #C44000;
    letter-spacing: 4px;
    margin-bottom: 6px;
  }
  .header .subtitle {
    font-size: 13px;
    color: #B06A30;
    opacity: 0.8;
  }
  #mainChart {
    width: 100%;
    height: 480px;
    background: transparent;
  }
  .legend-custom {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #8B5A2B;
    cursor: pointer;
    transition: opacity 0.25s;
    padding: 4px 10px;
    border-radius: 12px;
  }
  .legend-item:hover { opacity: 0.7; }
  .legend-item.inactive { opacity: 0.35; }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-line {
    width: 18px;
    height: 3px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .data-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 18px;
  }
  .data-card {
    background: linear-gradient(135deg, rgba(252,204,136,0.15) 0%, rgba(253,190,131,0.08) 100%);
    border: 1px solid rgba(234,88,14,0.15);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .data-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(234,88,14,0.1);
  }
  .data-card .label {
    font-size: 11px;
    color: #B06A30;
    margin-bottom: 4px;
  }
  .data-card .value {
    font-size: 22px;
    font-weight: 700;
    color: #EA580E;
  }
  .data-card .sub {
    font-size: 10px;
    color: #CC8450;
    margin-top: 2px;
  }
  .footer-note {
    text-align: center;
    font-size: 10px;
    color: #BB8050;
    margin-top: 16px;
    opacity: 0.6;
  }

  /* Tooltip 样式覆盖 */
  .custom-tooltip {
    background: rgba(255, 253, 248, 0.96) !important;
    border: 1px solid rgba(234, 88, 14, 0.2) !important;
    border-radius: 10px !important;
    box-shadow: 0 4px 16px rgba(180, 90, 20, 0.12) !important;
    padding: 12px 16px !important;
    backdrop-filter: blur(8px);
  }
</style>
</head>
<body>
<div class="chart-container">
  <div class="header">
    <h1>十一年高温天数变迁</h1>
    <div class="subtitle">2015—2025年全国高温日数变化趋势 · 数据来源：中国气候公报 & ERA5再分析数据</div>
  </div>

  <div class="legend-custom" id="customLegend"></div>

  <div id="mainChart"></div>

  <div class="data-cards" id="dataCards"></div>

  <div class="footer-note">悬停查看详细数据 · 点击图例可切换显示系列</div>
</div>

<script>
// ========== 配色方案：照日暖阳 ==========
const COLORS = {
  lightYellow: '#FFFBC5',
  yellow:      '#FED45F',
  orange:      '#F77B32',
  deepOrange:  '#EB4A23',
  red:         '#D43D28',
  crimson:     '#931519',

  // 辅助色
  warm1: '#FCCC88',   // 柔暖
  warm2: '#FDBE83',   // 明媚
  warm3: '#FD9C3B',   // 和悦
  warm4: '#EA580E',   // 慵懒（主色）
};

const SERIES_COLORS = [COLORS.deepOrange, COLORS.orange, COLORS.warm4];
const AREA_GRADIENT_START = 'rgba(253,156,59,0.35)';
const AREA_GRADIENT_END   = 'rgba(253,156,59,0.02)';

// ========== 数据 ==========
// 中国气候公报数据
const climateData = {
  years: [2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025],
  avgHotDays:     [8.5, 10.7, 12.1, 11.8, 11.8, 9.4, 12.0, 16.4, 13.5, 15.6, 16.5],  // 全国平均高温天数(≥35℃)
  summerHotDays:  [7.8,  9.9, 10.7, 10.2, 10.0, 8.0,  9.1, 14.3, 11.9, 12.6, 13.7],  // 夏季高温天数
};

// 全国33省份高温日次总和（从CSV数据汇总）
const provinceYearlyTotal = [
  { year: 2015, total: 954 },
  { year: 2016, total: 1173 },
  { year: 2017, total: 1375 },
  { year: 2018, total: 1430 },
  { year: 2019, total: 1407 },
  { year: 2020, total: 1325 },
  { year: 2021, total: 1534 },
  { year: 2022, total: 1680 },
  { year: 2023, total: 1547 },
  { year: 2024, total: 1756 },
  { year: 2025, total: 1920 },
];

// ========== 初始化图表 ==========
const chartDom = document.getElementById('mainChart');
const myChart = echarts.init(chartDom, null, { renderer: 'canvas' });

const seriesNames = ['全国平均高温天数', '夏季高温天数', '全国高温日次总和'];
let seriesVisibility = [true, true, true];

function getOption() {
  return {
    backgroundColor: 'transparent',
    grid: {
      top: 50,
      right: 60,
      bottom: 40,
      left: 58,
      containLabel: false,
    },
    tooltip: {
      trigger: 'axis',
      backgroundColor: 'rgba(255,253,248,0.97)',
      borderColor: 'rgba(234,88,14,0.2)',
      borderWidth: 1,
      textStyle: { color: '#5D3A1A', fontSize: 12 },
      extraCssText: 'border-radius:10px;box-shadow:0 4px 16px rgba(180,90,20,0.12);padding:12px 16px;',
      axisPointer: {
        type: 'cross',
        crossStyle: { color: 'rgba(234,88,14,0.2)' },
        lineStyle: { color: 'rgba(234,88,14,0.3)', type: 'dashed' },
      },
      formatter: function(params) {
        let html = `<div style="font-weight:700;font-size:14px;color:#C44000;margin-bottom:8px;">${params[0].axisValue}年</div>`;
        params.forEach(p => {
          if (p.seriesName && p.value !== undefined) {
            const unit = p.seriesIndex === 2 ? ' 站·天' : ' 天';
            const dotColor = SERIES_COLORS[p.seriesIndex] || COLORS.warm4;
            html += `<div style="display:flex;align-items:center;gap:6px;margin:3px 0;">
              <span style;display:inline-block;width:8px;height:8px;border-radius:50%;background:${dotColor};"></span>
              <span style="color:#8B5A2B;flex:1;">${p.seriesName}</span>
              <span style="font-weight:600;color:#C44000;">${p.value}${unit}</span>
            </div>`;
          }
        });
        return html;
      }
    },
    xAxis: {
      type: 'category',
      data: climateData.years.map(String),
      axisLine: { lineStyle: { color: 'rgba(180,106,38,0.25)' } },
      axisTick: { show: false },
      axisLabel: {
        color: '#B06A30',
        fontSize: 12,
        fontWeight: 500,
        formatter: "{value}",
      },
      axisPointer: {
        label: {
          show: true,
          color: '#C44000',
          fontWeight: 600,
          backgroundColor: 'rgba(252,204,136,0.2)',
        }
      }
    },
    yAxis: [
      {
        type: 'value',
        name: '天数 (天)',
        nameTextStyle: { color: '#B06A30', fontSize: 11, padding: [0, 32, 0, 0] },
        position: 'left',
        max: 20,
        splitNumber: 5,
        axisLine: { show: true, lineStyle: { color: 'rgba(180,106,38,0.2)' } },
        axisTick: { show: false },
        axisLabel: {
          color: '#BB8050',
          fontSize: 11,
          formatter: '{value}',
        },
        splitLine: {
          lineStyle: {
            color: 'rgba(200,150,80,0.1)',
            type: 'dashed',
          }
        },
      },
      {
        type: 'value',
        name: '站·天',
        nameTextStyle: { color: '#B06A30', fontSize: 11, padding: [0, 0, 0, 36] },
        position: 'right',
        max: 2200,
        splitNumber: 5,
        axisLine: { show: true, lineStyle: { color: 'rgba(180,106,38,0.2)' } },
        axisTick: { show: false },
        axisLabel: {
          color: '#BB8050',
          fontSize: 11,
        },
        splitLine: { show: false },
      }
    ],
    series: [
      {
        name: '全国平均高温天数',
        type: 'line',
        data: climateData.avgHotDays,
        yAxisIndex: 0,
        smooth: 0.35,
        symbol: 'circle',
        symbolSize: 7,
        showSymbol: true,
        lineStyle: {
          width: 3,
          color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
            { offset: 0, color: COLORS.deepOrange },
            { offset: 1, color: COLORS.red },
          ]),
          shadowColor: 'rgba(235,74,35,0.25)',
          shadowBlur: 6,
        },
        itemStyle: {
          color: COLORS.deepOrange,
          borderColor: '#fff',
          borderWidth: 2,
        },
        emphasis: {
          scale: true,
          itemStyle: { shadowColor: 'rgba(235,74,35,0.4)', shadowBlur: 10 },
        },
        areaStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: 'rgba(235,74,35,0.12)' },
            { offset: 1, color: 'rgba(235,74,35,0)' },
          ]),
        },
        animationDuration: 1500,
        animationEasing: 'cubicOut',
      },
      {
        name: '夏季高温天数',
        type: 'line',
        data: climateData.summerHotDays,
        yAxisIndex: 0,
        smooth: 0.35,
        symbol: 'diamond',
        symbolSize: 7,
        showSymbol: true,
        lineStyle: {
          width: 2.5,
          color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
            { offset: 0, color: COLORS.orange },
            { offset: 1, color: COLORS.warm3 },
          ]),
          shadowColor: 'rgba(247,123,50,0.25)',
          shadowBlur: 6,
          type: 'dashed',
        },
        itemStyle: {
          color: COLORS.orange,
          borderColor: '#fff',
          borderWidth: 2,
        },
        emphasis: {
          scale: true,
          itemStyle: { shadowColor: 'rgba(247,123,50,0.4)', shadowBlur: 10 },
        },
        areaStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: 'rgba(247,123,50,0.08)' },
            { offset: 1, color: 'rgba(247,123,50,0)' },
          ]),
        },
        animationDuration: 1500,
        animationDelay: 300,
        animationEasing: 'cubicOut',
      },
      {
        name: '全国高温日次总和',
        type: 'line',
        data: provinceYearlyTotal.map(d => d.total),
        yAxisIndex: 1,
        smooth: 0.25,
        symbol: 'roundRect',
        symbolSize: 8,
        showSymbol: true,
        lineStyle: {
          width: 2.5,
          color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
            { offset: 0, color: COLORS.warm4 },
            { offset: 1, color: COLORS.crimson },
          ]),
          shadowColor: 'rgba(234,88,14,0.3)',
          shadowBlur: 8,
        },
        itemStyle: {
          color: COLORS.warm4,
          borderColor: '#fff',
          borderWidth: 2,
        },
        emphasis: {
          scale: true,
          itemStyle: { shadowColor: 'rgba(234,88,14,0.5)', shadowBlur: 12 },
        },
        areaStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: 'rgba(234,88,14,0.22)' },
            { offset: 0.6, color: 'rgba(234,88,14,0.08)' },
            { offset: 1, color: 'rgba(234,88,14,0)' },
          ]),
          origin: 'auto',
        },
        markPoint: {
          data: [
            { type: 'max', name: '最高值' },
            { type: 'min', name: '最低值' },
          ],
          symbol: 'pin',
          symbolSize: 42,
          label: {
            fontSize: 10,
            color: '#fff',
            fontWeight: 600,
          },
          itemStyle: {
            color: new echarts.graphic.RadialGradient(0.5, 0.5, 0.6, [
              { offset: 0, color: COLORS.red },
              { offset: 1, color: COLORS.crimson },
            ]),
            shadowColor: 'rgba(147,21,25,0.35)',
            shadowBlur: 8,
          },
        },
        animationDuration: 1800,
        animationDelay: 600,
        animationEasing: 'elasticOut',
      }
    ],
    // 关闭内置图例，使用自定义图例
    legend: { show: false },
  };
}

myChart.setOption(getOption());

// ========== 自定义图例 ==========
function renderLegend() {
  const container = document.getElementById('customLegend');
  const icons = [
    `<div class="legend-line" style="background: linear-gradient(90deg, ${COLORS.deepOrange}, ${COLORS.red});height:3px;border-radius:2px;"></div>`,
    `<div class="legend-line" style="background: linear-gradient(90deg, ${COLORS.orange}, ${COLORS.warm3});height:3px;border-radius:2px;border-style:dashed;background-image:none;border-top:2.5px dashed ${COLORS.orange};background:transparent;height:0;"></div>`,
    `<div class="legend-line" style="background: linear-gradient(90deg, ${COLORS.warm4}, ${COLORS.crimson});height:3px;border-radius:2px;"></div>`,
  ];
  container.innerHTML = seriesNames.map((name, i) =>
    `<div class="legend-item ${seriesVisibility[i] ? '' : 'inactive'}" data-index="${i}">
      ${icons[i]}
      <span>${name}</span>
    </div>`
  ).join('');

  container.querySelectorAll('.legend-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.index);
      seriesVisibility[idx] = !seriesVisibility[idx];
      myChart.dispatchAction({
        type: seriesVisibility[idx] ? 'legendSelect' : 'legendUnSelect',
        name: seriesNames[idx],
      });
      renderLegend();
    });
  });
}
renderLegend();

// ========== 数据卡片 ==========
function renderDataCards() {
  const container = document.getElementById('dataCards');
  const cards = [
    {
      label: '2025年平均高温天数',
      value: climateData.avgHotDays[10],
      sub: `较2015年 +${(climateData.avgHotDays[10] - climateData.avgHotDays[0]).toFixed(1)}天 (↑${((climateData.avgHotDays[10]/climateData.avgHotDays[0]-1)*100).toFixed(1)}%)`,
    },
    {
      label: '2025年夏季高温天数',
      value: climateData.summerHotDays[10],
      sub: `较2015年 +${(climateData.summerHotDays[10] - climateData.summerHotDays[0]).toFixed(1)}天 (↑${((climateData.summerHotDays[10]/climateData.summerHotDays[0]-1)*100).toFixed(1)}%)`,
    },
    {
      label: '2025年全国高温日次总和',
      value: provinceYearlyTotal[10].total,
      sub: `较2015年 +${provinceYearlyTotal[10].total - provinceYearlyTotal[0].total}站·天 (↑${(((provinceYearlyTotal[10].total/provinceYearlyTotal[0].total)-1)*100).toFixed(1)}%)`,
    },
  ];

  container.innerHTML = cards.map(c =>
    `<div class="data-card">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
      <div class="sub">${c.sub}</div>
    </div>`
  ).join('');
}
renderDataCards();

// ========== 响应式 ==========
window.addEventListener('resize', () => myChart.resize());

// ========== 高亮动画 ==========
myChart.on('highlight', function(params) {
  // 可以添加额外的高亮效果
});
</script>
</body>
</html>
