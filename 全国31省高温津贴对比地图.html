<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全国31省高温津贴标准对比地图</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:transparent;font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;}
#main-container{
  width:700px;height:780px;background:transparent;position:relative;
}
#map-chart{width:700px;height:460px;}
#bar-chart{width:700px;height:310px;margin-top:10px;}
@media print{
  #main-container{width:148mm;height:165mm;}
}
</style>
</head>
<body>
<div id="main-container">
  <div id="map-chart"></div>
  <div id="bar-chart"></div>
</div>

<script>
(function(){
// ======================== 省份数据 ========================
var rawData = [
  {name:'北京',     monthly:180, months:3, year:'标准为2014年制定',      dailyText:'室外≥180/室内≥120元/月',   warning:true,  source:'搜狐/腾讯新闻2025'},
  {name:'天津',     monthly:960, months:0, year:'与日工资12%动态挂钩',    dailyText:'约32元/天(日工资×12%)',     warning:false, source:'搜狐2025', note:'计发方式特殊，月值偏高'},
  {name:'河北省',   monthly:304, months:0, year:'标准已10+年未调整',      dailyText:'室外2元/时, 室内1.5元/时',   warning:true,  source:'搜狐2025'},
  {name:'山西省',   monthly:240, months:3, year:'标准已10+年未调整',      dailyText:'240元/月',                  warning:true,  source:'搜狐2025'},
  {name:'上海',     monthly:300, months:4, year:'2019年调整至300元/月',   dailyText:'300元/月',                  warning:false, source:'搜狐/百家号2025'},
  {name:'江苏省',   monthly:300, months:4, year:'2018年调整至300元/月',   dailyText:'300元/月',                  warning:false, source:'搜狐/央广网2025'},
  {name:'浙江省',   monthly:300, months:4, year:'2018年调整',             dailyText:'室外300/室内200元/月',      warning:false, source:'搜狐/百家号2025'},
  {name:'安徽省',   monthly:330, months:3, year:'标准已10+年未调整',      dailyText:'≥15元/工作日',             warning:true,  source:'搜狐2025'},
  {name:'福建省',   monthly:260, months:5, year:'标准已10+年未调整',      dailyText:'260元/月+5月12元/天',      warning:true,  source:'央广网2025'},
  {name:'江西省',   monthly:300, months:4, year:'标准已10+年未调整',      dailyText:'室外≥300/室内≥200元/月',   warning:true,  source:'搜狐2025'},
  {name:'山东省',   monthly:300, months:4, year:'标准已10+年未调整',      dailyText:'室外300/其他180元/月',      warning:true,  source:'搜狐2025'},
  {name:'河南省',   monthly:330, months:4, year:'2022年6月上调(10→15元)', dailyText:'15元/工作日',               warning:false, source:'搜狐/百家号'},
  {name:'湖北省',   monthly:360, months:4, year:'标准已10+年未调整',      dailyText:'12元/天',                   warning:true,  source:'搜狐/百家号'},
  {name:'湖南省',   monthly:150, months:3, year:'标准已10+年未调整',      dailyText:'≥150元/月(6.9元/天)',      warning:true,  source:'搜狐2025'},
  {name:'广东省',   monthly:300, months:5, year:'2021年调整至300元/月',   dailyText:'300元/月(13.8元/天折算)',   warning:false, source:'搜狐/百家号2025'},
  {name:'广西',     monthly:275, months:5, year:'标准已10+年未调整',      dailyText:'250-300元/月',             warning:true,  source:'搜狐2025'},
  {name:'海南省',   monthly:300, months:7, year:'按天计发(10元/天)',       dailyText:'10元/天',                   warning:true,  source:'搜狐2025', note:'发放7个月，全国最长'},
  {name:'重庆',     monthly:240, months:0, year:'标准已10+年未调整',      dailyText:'5-15元/天(分三档)',        warning:true,  source:'搜狐/百家号2025'},
  {name:'四川省',   monthly:540, months:0, year:'2024年8月上调(10-18→13-23)', dailyText:'13-23元/天(分档)',      warning:false, source:'搜狐/百家号2024', note:'最新调增省份'},
  {name:'贵州省',   monthly:168, months:4, year:'标准已10+年未调整',      dailyText:'168元/月',                  warning:true,  source:'百家号'},
  {name:'云南省',   monthly:210, months:4, year:'标准已10+年未调整',      dailyText:'10元/天(室外)',            warning:true,  source:'综合公开资料'},
  {name:'陕西省',   monthly:550, months:4, year:'标准已10+年未调整',      dailyText:'关中陕南25元/陕北15元/天',  warning:true,  source:'搜狐/百家号2025', note:'陕北仅2个月全国最短'},
  {name:'辽宁省',   monthly:200, months:4, year:'标准已10+年未调整',      dailyText:'200元/月',                  warning:true,  source:'百家号'},
  {name:'吉林省',   monthly:200, months:3, year:'标准已10+年未调整',      dailyText:'未明确(按月估200)',         warning:true,  source:'推断'},
  {name:'内蒙古',   monthly:180, months:4, year:'标准已10+年未调整',      dailyText:'180元/月',                  warning:true,  source:'百家号'},
  {name:'甘肃省',   monthly:300, months:4, year:'标准已10+年未调整',      dailyText:'5-15元/天(分档)',          warning:true,  source:'百家号'},
  {name:'宁夏',     monthly:200, months:4, year:'标准已10+年未调整',      dailyText:'未明确(按月估200)',         warning:true,  source:'推断'},
  {name:'新疆',     monthly:200, months:3, year:'标准已10+年未调整',      dailyText:'未明确(按月估200)',         warning:true,  source:'推断'},
  {name:'黑龙江省', monthly:0,   months:0, year:'气温未达标，无高温津贴', dailyText:'无',                        warning:false, source:'央广网/人社部门', noSubsidy:true},
  {name:'青海省',   monthly:0,   months:0, year:'气温未达标，无高温津贴', dailyText:'无',                        warning:false, source:'央广网/人社部门', noSubsidy:true},
  {name:'西藏',     monthly:0,   months:0, year:'气温未达标，无高温津贴', dailyText:'无',                        warning:false, source:'央广网/人社部门', noSubsidy:true}
];

// GeoJSON 名称映射 → 全称
var geoNameMap = {
  '北京':'北京市','天津':'天津市','上海':'上海市','重庆':'重庆市',
  '河北省':'河北省','山西省':'山西省','辽宁省':'辽宁省','吉林省':'吉林省',
  '黑龙江省':'黑龙江省','江苏省':'江苏省','浙江省':'浙江省','安徽省':'安徽省',
  '福建省':'福建省','江西省':'江西省','山东省':'山东省','河南省':'河南省',
  '湖北省':'湖北省','湖南省':'湖南省','广东省':'广东省','海南省':'海南省',
  '四川省':'四川省','贵州省':'贵州省','云南省':'云南省','陕西省':'陕西省',
  '甘肃省':'甘肃省','青海省':'青海省','台湾省':'台湾省',
  '内蒙古':'内蒙古自治区','广西':'广西壮族自治区','西藏':'西藏自治区',
  '宁夏':'宁夏回族自治区','新疆':'新疆维吾尔自治区'
};

// 颜色映射
function getColor(val){
  if(val<=0) return '#e0e0e0';
  var stops=[
    {v:0,c:'#f7f4f0'},{v:120,c:'#fde0d2'},{v:168,c:'#fcb498'},
    {v:200,c:'#fb8768'},{v:260,c:'#f45b42'},{v:300,c:'#d73027'},
    {v:400,c:'#b2182b'},{v:500,c:'#8b0000'},{v:600,c:'#5c0000'}
  ];
  for(var i=stops.length-1;i>=0;i--){
    if(val>=stops[i].v){
      if(i===stops.length-1) return stops[i].c;
      var lo=stops[i],hi=stops[i+1];
      var t=Math.min(1,Math.max(0,(val-lo.v)/(hi.v-lo.v)));
      return interp(lo.c,hi.c,t);
    }
  }
  return stops[0].c;
}
function interp(c1,c2,t){
  var r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  var r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  var r=Math.round(r1+(r2-r1)*t),g=Math.round(g1+(g2-g1)*t),b=Math.round(b1+(b2-b1)*t);
  return '#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
}

// 构建地图数据
var mapSeriesData=[];
var warningList=[];
rawData.forEach(function(d){
  var gName=geoNameMap[d.name]||d.name;
  var item={
    name:gName,value:d.monthly,
    months:d.months,dailyText:d.dailyText,year:d.year,
    warning:d.warning,noSubsidy:!!d.noSubsidy,
    source:d.source,note:d.note||'',
    shortName:d.name
  };
  mapSeriesData.push(item);
  if(d.warning) warningList.push(item);
});

// =================== 加载地图并初始化 ===================
var mapDom=document.getElementById('map-chart');
var barDom=document.getElementById('bar-chart');
var mapChart=echarts.init(mapDom,null,{devicePixelRatio:2});
var barChart=echarts.init(barDom,null,{devicePixelRatio:2});

fetch(fetch('./china.json'))
.then(function(r){return r.json();})
.then(function(geo){
  echarts.registerMap('china',geo);

  // ===== 地图配置 =====
  mapChart.setOption({
    backgroundColor:'transparent',
    title:{
      text:'全国31省(区/市)高温津贴标准对比',
      subtext:'月标准(元) 分级着色  |  红色虚线边框 = 10年以上未随CPI调整',
      left:'center',top:8,
      textStyle:{fontSize:14,fontWeight:'bold',color:'#2c2c2c'},
      subtextStyle:{fontSize:9,color:'#999',lineHeight:16}
    },
    tooltip:{
      trigger:'item',
      backgroundColor:'rgba(255,255,255,0.97)',
      borderColor:'#d0d0d0',borderWidth:1,borderRadius:6,
      padding:[10,13],
      textStyle:{color:'#333',fontSize:11},
      extraCssText:'box-shadow:0 2px 12px rgba(0,0,0,0.12);max-width:220px;',
      formatter:function(p){
        if(!p.data||p.data.value===undefined) return p.name;
        var d=p.data;
        if(d.noSubsidy){
          return '<div style="font-weight:700;font-size:13px;margin-bottom:4px;">'+d.shortName+'</div>'+
            '<div style="color:#999;">气温未达标，无高温津贴政策</div>'+
            '<div style="border-top:1px solid #eee;margin-top:6px;padding-top:4px;font-size:10px;color:#aaa;">'+d.source+'</div>';
        }
        var h='<div style="font-weight:700;font-size:13px;margin-bottom:6px;color:#1a1a1a;">'+d.shortName+'</div>';
        h+='<div style="display:flex;justify-content:space-between;margin-bottom:2px;"><span style="color:#666;">月标准:</span><span style="font-weight:700;color:#d73027;">'+d.value+' 元/月</span></div>';
        h+='<div style="display:flex;justify-content:space-between;margin-bottom:2px;"><span style="color:#666;">计发方式:</span><span>'+d.dailyText+'</span></div>';
        h+='<div style="display:flex;justify-content:space-between;margin-bottom:2px;"><span style="color:#666;">发放月数:</span><span style="font-weight:600;">'+(d.months>0?d.months+' 个月':'按实际高温天数')+'</span></div>';
        h+='<div style="display:flex;justify-content:space-between;margin-bottom:2px;"><span style="color:#666;">调整情况:</span><span style="max-width:140px;">'+d.year+'</span></div>';
        if(d.note) h+='<div style="display:flex;justify-content:space-between;margin-bottom:2px;"><span style="color:#666;">备注:</span><span style="color:#e67e22;">'+d.note+'</span></div>';
        h+='<div style="border-top:1px solid #eee;margin-top:6px;padding-top:4px;font-size:10px;color:#aaa;">来源: '+d.source+'</div>';
        if(d.warning){
          h+='<div style="margin-top:5px;padding:3px 6px;background:#fff3f3;border-left:3px solid #e74c3c;color:#c0392b;font-size:10px;border-radius:0 3px 3px 0;">⚠ 该省津贴标准已超10年未随CPI调整</div>';
        }
        return h;
      }
    },
    visualMap:{
      show:true,type:'piecewise',
      pieces:[
        {min:500,label:'500+',color:getColor(500)}, {min:400,max:499,label:'400-499',color:getColor(450)},
        {min:300,max:399,label:'300-399',color:getColor(350)}, {min:240,max:299,label:'240-299',color:getColor(270)},
        {min:168,max:239,label:'168-239',color:getColor(200)}, {min:1,max:167,label:'1-167',color:getColor(130)},
        {value:0,label:'无津贴',color:'#e0e0e0'}
      ],
      left:8,bottom:8,orient:'horizontal',
      itemWidth:12,itemHeight:12,
      textStyle:{color:'#555',fontSize:8.5},
      itemGap:5,calculable:false
    },
    graphic:[
      {type:'rect',right:10,top:66,shape:{width:12,height:12},
       style:{fill:'transparent',stroke:'#e74c3c',lineWidth:2.5,lineDash:[3,2]}},
      {type:'text',right:26,top:64,
       style:{text:'10年+未调整',fill:'#c0392b',fontSize:9,fontFamily:'"PingFang SC","Microsoft YaHei",sans-serif'}},
      {type:'rect',right:115,top:66,shape:{width:12,height:12},
       style:{fill:'#e0e0e0',stroke:'#ccc',lineWidth:1}},
      {type:'text',right:131,top:64,
       style:{text:'无津贴政策',fill:'#999',fontSize:9,fontFamily:'"PingFang SC","Microsoft YaHei",sans-serif'}},
      {type:'text',left:8,bottom:56,
       style:{text:'数据来源：人社部、各地人社厅(2025) | 月标准含折算值 | 综合搜狐/央广网/百家号',fill:'#bbb',fontSize:7.5}}
    ],
    series:[{
      type:'map',map:'china',roam:false,
      zoom:1.18,center:[104.5,36],aspectScale:0.85,
      nameProperty:'name',
      label:{show:true,color:'#444',fontSize:7},
      emphasis:{
        label:{show:true,fontSize:9.5,fontWeight:'bold',color:'#111'},
        itemStyle:{shadowBlur:10,shadowColor:'rgba(0,0,0,0.25)'}
      },
      itemStyle:{borderColor:'#fff',borderWidth:1},
      data:mapSeriesData.map(function(d){
        return {
          name:d.name,value:d.value,
          months:d.months,dailyText:d.dailyText,year:d.year,
          warning:d.warning,noSubsidy:d.noSubsidy,
          source:d.source,note:d.note,shortName:d.shortName,
          itemStyle:{
            areaColor:d.noSubsidy?'#f0f0f0':getColor(d.value),
            borderColor:d.warning?'#e74c3c':'#fff',
            borderWidth:d.warning?2.5:1,
            borderType:d.warning?'dashed':'solid',
            shadowBlur:d.warning?5:0,
            shadowColor:d.warning?'rgba(231,76,60,0.45)':'transparent'
          },
          emphasis:{
            itemStyle:{
              areaColor:d.noSubsidy?'#e8e8e8':getColor(d.value),
              borderColor:d.warning?'#c0392b':'#555',
              borderWidth:d.warning?3.5:1.5
            }
          }
        };
      })
    }]
  });

  // ===== 条形图配置 =====
  var sorted=rawData.slice().sort(function(a,b){return b.monthly-a.monthly;});
  var barNames=sorted.map(function(d){return d.name;});
  var barVals=sorted.map(function(d){return d.monthly;});
  var barMonths=sorted.map(function(d){return d.months;});
  var barWarn=sorted.map(function(d){return d.warning;});
  var barNo=sorted.map(function(d){return !!d.noSubsidy;});

  // 颜色
  var barColors=sorted.map(function(d){
    if(d.noSubsidy) return '#d9d9d9';
    if(d.warning) return '#e74c3c';
    return getColor(d.monthly);
  });

  barChart.setOption({
    backgroundColor:'transparent',
    title:{
      text:'31省(区/市)高温津贴月标准排名 (元/月)',
      subtext:'红色柱 = 10年+未调整  |  灰色柱 = 无津贴政策',
      left:'center',top:4,
      textStyle:{fontSize:12,fontWeight:'bold',color:'#2c2c2c'},
      subtextStyle:{fontSize:8.5,color:'#999'}
    },
    tooltip:{
      trigger:'axis',axisPointer:{type:'shadow'},
      backgroundColor:'rgba(255,255,255,0.97)',borderColor:'#d0d0d0',borderWidth:1,borderRadius:6,
      textStyle:{fontSize:10.5,color:'#333'},
      formatter:function(params){
        var p=params[0];var d=sorted[p.dataIndex];
        var h='<b>'+d.name+'</b><br/>';
        h+='月标准: <b style="color:#d73027;">'+d.monthly+' 元/月</b><br/>';
        h+='发放月数: '+(d.months>0?d.months+'个月':'按实际高温天数')+'<br/>';
        h+='计发方式: '+d.dailyText+'<br/>';
        h+='调整情况: '+d.year;
        if(d.warning) h+='<br/><span style="color:#e74c3c;">⚠ 10年+未调整</span>';
        return h;
      }
    },
    grid:{left:68,right:20,top:42,bottom:30},
    xAxis:{type:'value',name:'元/月',nameTextStyle:{fontSize:9,color:'#888'},
      axisLabel:{fontSize:8,color:'#666'},splitLine:{lineStyle:{color:'#f0f0f0'}}},
    yAxis:{type:'category',data:barNames.reverse(),inverse:true,
      axisLabel:{fontSize:7.5,color:'#555'},axisTick:{show:false},
      axisLine:{lineStyle:{color:'#ddd'}}},
    series:[{
      type:'bar',data:barVals.reverse().map(function(v,i){
        var idx=sorted.length-1-i;
        return {
          value:v,
          itemStyle:{
            color:barColors[idx],
            borderRadius:v>0?[0,3,3,0]:0,
            borderColor:barWarn[idx]?'#c0392b':'transparent',
            borderWidth:barWarn[idx]?2:0,
            borderType:barWarn[idx]?'dashed':'solid'
          }
        };
      }),
      barMaxWidth:14,
      label:{show:true,position:'right',fontSize:7.5,color:'#555',
        formatter:function(p){return p.value>0?p.value+'元':'无';}}
    }],
    graphic:[
      {type:'text',left:68,bottom:6,
       style:{text:'天津(960)因计发方式特殊(日工资×12%)，折算月值显著偏高 | 数据截至2025年',fill:'#bbb',fontSize:7.5}}
    ]
  });

  // 响应缩放
  window.addEventListener('resize',function(){mapChart.resize();barChart.resize();});
})
.catch(function(err){
  console.error('地图加载失败:',err);
  mapDom.innerHTML='<div style="text-align:center;padding:60px;color:#999;">地图数据加载失败，请检查网络连接<br/><small>'+err.message+'</small></div>';
});
})();
</script>
</body>
</html>
