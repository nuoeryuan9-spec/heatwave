var CW=1540,CH=560;
var box=document.getElementById("box");
var placed=[];

// 配色函数
function getColor(w){
  if(w>=130) return ["#FFFBC5","#FED45F","#F77B32"][~~(Math.random()*3)];
  if(w>=70)  return ["#FED45F","#F77B32","#EB4A23"][~~(Math.random()*3)];
  if(w>=30)  return ["#F77B32","#EB4A23","#931519"][~~(Math.random()*3)];
  return ["#EB4A23","#931519","#68161A"][~~(Math.random()*3)];
}

// 字号函数
function getFS(w){
  if(w>=500) return 82;
  return Math.round(10+(68-10)*Math.sqrt(Math.max(0,w-3)/(550-3)));
}

// 估算文字宽高
function getSize(t,fs){
  var w=0;
  for(var i=0;i<t.length;i++){
    w+=(t.charCodeAt(i)>255?fs:fs*0.6);
  }
  return{w:w*1.06,h:fs*1.25};
}

// 波浪长方形约束
function inWaveRect(cx,cy){
  var nx=(cx-CW/2)/(CW/2);
  var ny=(cy-CH/2)/(CH/2);
  var waveY=0.14*Math.sin(nx*Math.PI*2.5);
  var waveX=0.03*Math.sin(ny*Math.PI*2);
  return Math.abs(ny)<(0.88+waveY) && Math.abs(nx)<(0.97+waveX);
}

// 螺旋排布
function place(tw,th){
  var cx=CW/2,cy=CH/2;
  var MR=Math.min(CW,CH)*0.48;
  var angle=-Math.PI/2, r=2;
  for(var i=0;i<50000;i++){
    var x=cx+r*Math.cos(angle)-tw/2;
    var y=cy+r*Math.sin(angle)-th/2;
    if(x<2||y<2||x+tw>CW-2||y+th>CH-2){
      angle+=0.08; r+=0.08/(2*Math.PI); if(r>MR*1.6)break; continue;
    }
    if(!inWaveRect(x+tw/2,y+th/2)){
      angle+=0.08; r+=0.08/(2*Math.PI); if(r>MR*1.6)break; continue;
    }
    var ok=true;
    for(var j=0;j<placed.length;j++){
      var p=placed[j];
      if(!(x+tw<p.x-2||x>p.x+p.w+2||y+th<p.y-2||y>p.y+p.h+2)){ok=false;break;}
    }
    if(ok){placed.push({x:x,y:y,w:tw,h:th});return{x:x,y:y};}
    angle+=0.08; r+=0.08/(2*Math.PI); if(r>MR*1.6)break;
  }
  return null;
}

// 去重
var seen={};
var unique=[];
for(var i=0;i<D.length;i++){
  if(!seen[D[i][0]]){seen[D[i][0]]=1;unique.push(D[i]);}
}
D=unique;
D.sort(function(a,b){return b[1]-a[1];});

// 将hex颜色转为rgba，用于生成同色辉光
function hexToRgba(hex,a){
  hex=hex.replace("#","");
  var r=parseInt(hex.substring(0,2),16);
  var g=parseInt(hex.substring(2,4),16);
  var b=parseInt(hex.substring(4,6),16);
  return "rgba("+r+","+g+","+b+","+a+")";
}

// 生成hover时的text-shadow（同色辉光）
function makeGlowShadow(color){
  return "0 0 8px "+hexToRgba(color,0.7)+","+
         "0 0 20px "+hexToRgba(color,0.5)+","+
         "0 0 40px "+hexToRgba(color,0.35)+","+
         "0 0 70px "+hexToRgba(color,0.2)+","+
         "0 0 110px "+hexToRgba(color,0.1);
}

// 正常态text-shadow
var normalShadow="0 2px 8px rgba(0,0,0,0.5)";

// 创建DOM元素
for(var i=0;i<D.length;i++){
  var t=D[i][0], w=D[i][1];
  var fs=(t==="热死了"?82:getFS(w));
  var color=(t==="热死了"?"#FF2020":getColor(w));
  var sz=getSize(t,fs);
  var pos;

  if(t==="热死了"){
    pos={x:(CW-sz.w)/2, y:(CH-sz.h)/2-10};
    placed.push({x:pos.x,y:pos.y,w:sz.w,h:sz.h});
  }else{
    pos=place(sz.w,sz.h);
    if(!pos){
      var fs2=Math.max(9,fs-2);
      var sz2=getSize(t,fs2);
      pos=place(sz2.w,sz2.h);
      if(pos){fs=fs2;sz=sz2;}
      else{continue;}
    }
  }

  var el=document.createElement("span");
  el.className="w"+(t==="热死了"?" main":"");
  el.textContent=t;
  el.style.fontSize=fs+"px";
  el.style.color=color;
  el.style.left=pos.x+"px";
  el.style.top=pos.y+"px";
  // 存储颜色到data属性，hover时使用
  el.setAttribute("data-color",color);
  box.appendChild(el);

  // ====== hover光效：散发与字体颜色相近的辉光 ======
  (function(el,color){
    el.addEventListener("mouseenter",function(){
      if(el._hoverGlow) return;
      el._hoverGlow=true;
      // 停止微弹，进入hover状态
      el._wigglePaused=true;
      el.classList.add("hover-glow");
      // 放大 + 同色辉光
      el.style.transform="scale(1.22)";
      el.style.textShadow=makeGlowShadow(color);
      el.style.filter="brightness(1.35)";
      // 散发光粒子
      spawnHoverParticles(el,color);
    });
    el.addEventListener("mouseleave",function(){
      el._hoverGlow=false;
      el._wigglePaused=false;
      el.classList.remove("hover-glow");
      el.style.transform="scale(1)";
      el.style.textShadow=normalShadow;
      el.style.filter="brightness(1)";
      // 移除残留光粒子
      var parts=el._hoverParts;
      if(parts){
        for(var k=0;k<parts.length;k++){
          if(parts[k]&&parts[k].parentNode) parts[k].remove();
        }
        el._hoverParts=null;
      }
    });
  })(el,color);

  // ====== 弹入 + 持续微弹 ======
  (function(el,delay){
    setTimeout(function(){
      // 弹入动画
      el.style.transition="opacity 0.4s ease, transform 0.55s cubic-bezier(0.34,1.56,0.64,1)";
      el.style.opacity="1";
      el.style.transform="scale(1.06)";
      setTimeout(function(){
        el.style.transition="none";
        el.style.transform="scale(1)";
        el.classList.add("show");
        // 开始持续微弹
        startWiggle(el);
      },580);
    },delay);
  })(el, i*25+60);
}

// 持续微弹动画（每个词都有）
function startWiggle(el){
  (function tick(){
    // hover时暂停微弹
    if(el._wigglePaused){
      setTimeout(tick,200);
      return;
    }
    if(!el.classList.contains("show")) return;
    var sc=1+Math.random()*0.025;
    var dur=1.6+Math.random()*2.2;
    el.style.transition="transform "+dur+"s ease-in-out";
    el.style.transform="scale("+sc+")";
    // 下一次微弹在当前动画完成后
    setTimeout(tick, dur*1000+Math.random()*800);
  })();
}

// hover时散发光粒子
function spawnHoverParticles(el,color){
  var rect=el.getBoundingClientRect();
  var boxRect=box.getBoundingClientRect();
  var cx=rect.left-boxRect.left+rect.width/2;
  var cy=rect.top-boxRect.top+rect.height/2;
  var parts=[];

  for(var p=0;p<8;p++){
    var part=document.createElement("div");
    part.className="glow-particle";
    var angle=p*Math.PI*2/8+Math.random()*0.6;
    var dist=20+Math.random()*35;
    var size=2+Math.random()*4;
    var startX=cx-size/2+Math.cos(angle)*5;
    var startY=cy-size/2+Math.sin(angle)*5;
    part.style.width=size+"px";
    part.style.height=size+"px";
    part.style.left=startX+"px";
    part.style.top=startY+"px";
    part.style.background=color;
    part.style.boxShadow="0 0 6px "+hexToRgba(color,0.8)+",0 0 14px "+hexToRgba(color,0.5);
    part.style.opacity="1";
    box.appendChild(part);
    parts.push(part);

    // 动画：向外飘散+淡出
    (function(part,sx,sy,angle,dist){
      var startTime=null;
      var duration=600+Math.random()*400;
      function animate(ts){
        if(!startTime) startTime=ts;
        var progress=Math.min((ts-startTime)/duration,1);
        var ease=1-Math.pow(1-progress,2); // easeOutQuad
        var dx=Math.cos(angle)*dist*ease;
        var dy=Math.sin(angle)*dist*ease;
        part.style.left=(sx+dx)+"px";
        part.style.top=(sy+dy)+"px";
        part.style.opacity=String(1-progress);
        part.style.transform="scale("+(1-progress*0.5)+")";
        if(progress<1){
          requestAnimationFrame(animate);
        }else{
          part.remove();
        }
      }
      requestAnimationFrame(animate);
    })(part,startX,startY,angle,dist);
  }
  el._hoverParts=parts;
}

// 主词呼吸动画
var mainEl=box.querySelector(".main");
if(mainEl){
  mainEl.style.cursor="pointer";
  (function breathe(){
    if(mainEl._hoverGlow){setTimeout(breathe,500);return;}
    mainEl.style.transition="transform 2.8s ease-in-out, text-shadow 2.8s ease-in-out";
    mainEl.style.transform="scale(1.07)";
    mainEl.style.textShadow="0 4px 14px rgba(0,0,0,0.55),0 0 50px rgba(255,32,32,0.5),0 0 80px rgba(255,32,32,0.3)";
    setTimeout(function(){
      if(mainEl._hoverGlow){setTimeout(breathe,500);return;}
      mainEl.style.transform="scale(1)";
      mainEl.style.textShadow="0 2px 10px rgba(0,0,0,0.5),0 0 28px rgba(255,32,32,0.3)";
      setTimeout(breathe,2800);
    },2800);
  })();
}

})();
</script>
