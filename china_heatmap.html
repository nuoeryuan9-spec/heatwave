<!DOCTYPE html>
<html lang="zh-CN">

<meta charset="UTF-8">

<title>全国31省高温津贴标准对比地图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#FFF8F0;font-family:-apple-system,'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif}
#main-container{width:100%;max-width:740px;margin:0 auto;padding:16px 12px;position:relative}
#map-chart{width:100%;height:460px;position:relative;background:#fff;border-radius:12px;border:1px solid rgba(200,120,40,.15);overflow:hidden;min-height:460px}
#bar-chart{width:100%;height:310px;margin-top:10px;position:relative;background:#fff;border-radius:12px;border:1px solid rgba(200,120,40,.15);overflow:hidden}

/* Loading overlay — always visible until hidden */
.loading-mask{
  position:absolute;inset:0;
  background:#FFFAF5;
  z-index:50;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  transition:opacity .3s;
}
.loading-mask.hide{opacity:0;pointer-events:none;display:none}
.loading-spinner{width:36px;height:36px;border:3px solid rgba(230,126,34,.25);border-top:3px solid #E67E22;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:#8B4D08;margin-top:12px;font-weight:500}
.loading-sub{font-size:11px;color:rgba(140,70,20,.45);margin-top:6px}

/* Error panel — HIGH CONTRAST background */
.error-panel{
  display:none;
  position:absolute;inset:0;
  background:#FEF2F0;
  z-index:99;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;padding:40px;
  border-radius:12px;
}
.error-panel.show{display:flex!important}
.error-panel h3{font-size:18px;color:#C0392B;margin-bottom:10px}
.error-panel p{font-size:13px;color:rgba(139,77,8,.7);line-height:1.6;max-width:340px}
.error-panel button{
  margin-top:18px;padding:9px 28px;
  border-radius:8px;background:#E67E22;color:#fff;
  border:none;font-size:13px;font-weight:600;
  cursor:pointer;transition:background .2s
}
.error-panel button:hover{background:#D4730E}
.error-detail{font-size:11px;color:rgba(140,70,20,.4);margin-top:8px;word-break:break-all}

.footer{width:100%;max-width:740px;margin:0 auto;padding:4px 12px 16px;text-align:center;font-size:10px;color:rgba(140,70,20,.4)}

/* Map area placeholder text when nothing renders */
.map-placeholder{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:14px;color:rgba(200,120,40,.35);
  pointer-events:none;z-index:1;
  white-space:nowrap;
}
</style>
</head>

<div id="main-container">

      <div class="loading-text">正在加载地图地理数据</div>

    </div>
    <div class="error-panel" id="mapError">
      <h3>&#9888; 地图数据加载失败</h3>
      <p>无法获取中国地图地理数据。可能原因：网络连接中断、CDN 服务暂时不可用、或被安全策略拦截。</p>
      <button id="mapRetryBtn">&#x21bb; 重新加载</button>
      <div class="error-detail" id="mapErrorDetail"></div>
    </div>

  <!-- BAR CHART -->

    </div>

</div>

};

/* ================================================================
   COLOR INTERPOLATION
   ================================================================ */
function getColor(val){
  if(val <= 0) return '#e0e0e0';
  var stops = [
    {v:0,c:'#f7f4f0'},{v:120,c:'#fde0d2'},{v:168,c:'#fcb498'},
    {v:200,c:'#fb8768'},{v:260,c:'#f45b42'},{v:300,c:'#d73027'},
    {v:400,c:'#b2182b'},{v:500,c:'#8b0000'},{v:600,c:'#5c0000'}
  ];
  for(var i = stops.length - 1; i >= 0; i--){
    if(val >= stops[i].v){
      if(i === stops.length - 1) return stops[i].c;
      var lo = stops[i], hi = stops[i+1];
      var t = Math.min(1, Math.max(0, (val - lo.v) / (hi.v - lo.v)));
      return interp(lo.c, hi.c, t);
    }
  }
  return stops[0].c;
}
function interp(c1, c2, t){
  var r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  var r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  var r=Math.round(r1+(r2-r1)*t),g=Math.round(g1+(g2-g1)*t),b=Math.round(b1+(b2-b1)*t);
  return '#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
}

var barDom       = document.getElementById('bar-chart');
var mapLoading   = document.getElementById('mapLoading');
var mapError     = document.getElementById('mapError');
var mapRetryBtn  = document.getElementById('mapRetryBtn');
var mapPlaceholder = document.getElementById('mapPlaceholder');
var mapErrorDetail = document.getElementById('mapErrorDetail');
var barLoading   = document.getElementById('barLoading');
var barError     = document.getElementById('barError');

if(!mapDom || !barDom){
  console.error('[china_heatmap] Critical DOM elements #map-chart or #bar-chart missing');
  alert('页面初始化失败：缺少图表容器元素。请刷新页面重试。');
  return;
}
if(!mapLoading) mapLoading = _dummyEl();
if(!mapError)   mapError   = _dummyEl();
if(!barLoading) barLoading = _dummyEl();
if(!barError)   barError   = _dummyEl();
function _dummyEl(){ return {classList:{add:function(){},remove:function(){}}}; }

/* ================================================================
   ECHARTS LOADED?
   ================================================================ */
if(!ECHARTS_LOADED){
  console.error('[china_heatmap] echarts undefined — script failed to load from CDN');
  mapLoading.classList.add('hide');
  if(mapError){ mapError.classList.add('show'); }
  try{ mapError.querySelector('h3').textContent='&#9888; ECharts 库加载失败'; }catch(e){}
  try{ mapError.querySelector('p').textContent='无法从 CDN 加载 ECharts 可视化引擎。请检查网络连接后刷新页面。'; }catch(e){}
  return;
}
console.log('[china_heatmap] ECharts loaded OK, version:', echarts.version);

/* ================================================================
   INIT CHART INSTANCES
   ================================================================ */

try{

}catch(e){
  console.error('[china_heatmap] mapChart.init failed:', e);

  return;
}

try{
  barChart = echarts.init(barDom, null, {devicePixelRatio: window.devicePixelRatio || 2});
}catch(e){
  console.warn('[china_heatmap] barChart.init failed:', e);
}

/* ================================================================
   RESIZE (debounced)
   ================================================================ */
var _resizeTimer = null;
window.addEventListener('resize', function(){
  if(_resizeTimer) clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(function(){
    if(mapChart && !mapChart.isDisposed()){ try{mapChart.resize();}catch(e){} }
    if(barChart && !barChart.isDisposed()){ try{barChart.resize();}catch(e){} }
  }, 200);
});

/* ================================================================
   ERROR UI HELPERS
   ================================================================ */
function _showMapErr(msg, detail){
  console.error('[china_heatmap] MAP ERROR:', msg, detail||'');

  if(mapError) mapError.classList.add('show');
  try{ var p=mapError.querySelector('p'); if(p)p.textContent=msg||'地图加载失败'; }catch(e){}
  if(mapErrorDetail && detail){
    try{ mapErrorDetail.textContent='详情：'+detail; }catch(e){}
  }
  if(mapPlaceholder) mapPlaceholder.style.display = 'none';
}
function _hideMapErr(){
  if(mapError) mapError.classList.remove('show');
  mapLoading.classList.remove('hide');
  if(mapPlaceholder) mapPlaceholder.style.display = '';
}

function _showBarErr(msg){
  barLoading.classList.add('hide');
  if(barError) barError.classList.add('show');
  try{ var p=barError.querySelector('p'); if(p)p.textContent=msg||'柱状图渲染失败'; }catch(e){}
}

/* ================================================================

   ================================================================ */
if(mapRetryBtn){

/* ================================================================
   BUILD SERIES DATA
   ================================================================ */
function buildSeriesData(){
  var r=[];
  for(var i=0;i<rawData.length;i++){
    var d=rawData[i], gn=geoNameMap[d.name]||d.name;
    r.push({
      name:gn,value:d.monthly,months:d.months,dailyText:d.dailyText,
      year:d.year,warning:d.warning,noSubsidy:!!d.noSubsidy,
      source:d.source,note:d.note||'',shortName:d.name,
      itemStyle:{
        areaColor:d.noSubsidy?'#f0f0f0':getColor(d.monthly),
        borderColor:d.warning?'#e74c3c':'#fff',
        borderWidth:d.warning?2.5:1,
        borderType:d.warning?'dashed':'solid',
        shadowBlur:d.warning?5:0,
        shadowColor:d.warning?'rgba(231,76,60,0.45)':'transparent'
      },
      emphasis:{itemStyle:{areaColor:d.noSubsidy?'#e8e8e8':getColor(d.monthly),borderColor:d.warning?'#c0392b':'#555',borderWidth:d.warning?3.5:1.5}}
    });
  }
  return r;
}
var mapSeriesData = buildSeriesData();

    visualMap:{show:true,type:'piecewise',

      {type:'text',right:26,top:64,style:{text:'10年+未调整',fill:'#c0392b',fontSize:9}},

}

/* ================================================================
   RENDER BAR CHART
   ================================================================ */
function renderBarChart(){
  if(!barChart||barChart.isDisposed()){ _showBarErr('柱状图容器不可用'); return; }

  var sorted=rawData.slice().sort(function(a,b){return b.monthly-a.monthly;});
  var bNames=sorted.map(function(d){return d.name;});
  var bVals=sorted.map(function(d){return d.monthly;});
  var bColors=sorted.map(function(d){if(d.noSubsidy)return'#d9d9d9';if(d.warning)return'#e74c3c';return getColor(d.monthly);});
  var bWarn=sorted.map(function(d){return d.warning;});

  bNames.reverse();bVals.reverse();bColors.reverse();bWarn.reverse();

  var opt={
    backgroundColor:'transparent',
    title:{text:'31省(区/市)高温津贴月标准排名 (元/月)',
      subtext:'红色柱 = 10年+未调整 | 灰色柱 = 无津贴政策',left:'center',top:4,
      textStyle:{fontSize:12,fontWeight:'bold',color:'#2c2c2c'},subtextStyle:{fontSize:8.5,color:'#999'}},
    tooltip:{trigger:'axis',axisPointer:{type:'shadow'},backgroundColor:'rgba(255,255,255,0.97)',borderColor:'#d0d0d0',borderWidth:1,borderRadius:6,
      textStyle:{fontSize:10.5,color:'#333'},formatter:function(params){
        var p=params[0];if(!p)return'';var idx=sorted.length-1-p.dataIndex,d=sorted[idx];if(!d)return'';
        var h='<b>'+d.name+'</b><br/>月标准: <b style="color:#d73027;">'+d.monthly+' 元/月</b><br/>发放月数: '+(d.months>0?d.months+'个月':'按实际高温天数')+'<br/>计发方式: '+d.dailyText+'<br/>调整情况: '+d.year;
        if(d.warning)h+='<br/><span style="color:#e74c3c;">&#9888; 10年+未调整</span>';return h;}},
    grid:{left:68,right:20,top:42,bottom:30},
    xAxis:{type:'value',name:'元/月',nameTextStyle:{fontSize:9,color:'#888'},axisLabel:{fontSize:8,color:'#666'},splitLine:{lineStyle:{color:'#f0f0f0'}}},
    yAxis:{type:'category',data:bNames,inverse:true,axisLabel:{fontSize:7.5,color:'#555'},axisTick:{show:false},axisLine:{lineStyle:{color:'#ddd'}}},
    series:[{type:'bar',data:bVals.map(function(v,i){return{value:v,itemStyle:{color:bColors[i],borderRadius:v>0?[0,3,3,0]:0,borderColor:bWarn[i]?'#c0392b':'transparent',borderWidth:bWarn[i]?2:0,borderType:bWarn[i]?'dashed':'solid'}};}) ,
      barMaxWidth:14,label:{show:true,position:'right',fontSize:7.5,color:'#555',formatter:function(p){return p.value>0?p.value+'元':'无';}}}],
    graphic:[{type:'text',left:68,bottom:6,style:{text:'天津(960)因计发方式特殊(日工资×12%)，折算月值显著偏高 | 数据截至2025年',fill:'#bbb',fontSize:7.5}}]
  };
  try{ barChart.setOption(opt,true); barLoading.classList.add('hide'); console.log('[china_heatmap] Bar rendered!'); }
  catch(e){ console.error('[china_heatmap] bar setOption failed:', e); _showBarErr('柱状图渲染失败：'+e.message); }
}

/* ================================================================
   FETCH WITH TIMEOUT + FALLBACK CDNs
   ================================================================ */
var _currentCdnIndex = 0;

function fetchWithTimeout(url, ms){
  var ctrl = new AbortController();
  var timer = setTimeout(function(){ ctrl.abort(); }, ms);
  return fetch(url, {signal:ctrl.signal}).then(function(res){
    clearTimeout(timer);
    return res;
  }).catch(function(err){
    clearTimeout(timer);
    throw err;
  });
}

function _loadGeoWithFallback(){
  if(_currentCdnIndex >= GEO_CDN_URLS.length){
    // All CDNs exhausted
    _showMapErr(
      '所有地图数据源均不可用',
      '已尝试 '+GEO_CDN_URLS.length+' 个CDN源，均获取失败。\n建议：检查网络连接或刷新页面。'
    );
    renderBarChart();
    return;
  }

  var url = GEO_CDN_URLS[_currentCdnIndex];
  console.log('[china_heatmap] Trying CDN #' + (_currentCdnIndex+1) + ': ' + url);

  // Update loading subtext
  var loadingSub = mapLoading.querySelector('.loading-sub');
  if(loadingSub){
    var labels = ['从阿里云 DataV 获取...', '尝试备用数据源...', '使用备用CDN...'];
    loadingSub.textContent = labels[Math.min(_currentCdnIndex, labels.length-1)];
  }

  fetchWithTimeout(url, FETCH_TIMEOUT_MS)
    .then(function(res){
      if(!res.ok) throw new Error('HTTP ' + res.status + ' ' + res.statusText);
      console.log('[china_heatmap] Geo fetch OK (' + res.status + '), parsing JSON...');
      return res.json();
    })
    .then(function(geoJson){
      if(!geoJson || !geoJson.features || geoJson.features.length === 0){
        throw new Error('Invalid data: features array missing or empty (got ' + (geoJson ? Object.keys(geoJson).join(',') : 'null') + ')');
      }
      console.log('[china_heatmap] Got ' + geoJson.features.length + ' regions, rendering...');
      renderMapChart(geoJson);
      renderBarChart();
    })
    .catch(function(err){
      console.warn('[china_heatmap] CDN #' + (_currentCdnIndex+1) + ' failed:', err.name, err.message || err);
      _currentCdnIndex++;
      _loadGeoWithFallback(); // Try next CDN
    });
}

/* ================================================================
   START
   ================================================================ */
console.log('[china_heatmap] Starting load sequence...');
_loadGeoWithFallback();

})();
</script>
