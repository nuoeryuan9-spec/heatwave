<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爱心驿站覆盖缺口</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 397px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    display: flex;
    flex-direction: column;
    padding: 16px;
    background: transparent;
    gap: 12px;
  }

  .title-row { display: flex; align-items: center; gap: 8px; }
  .title-icon {
    width: 26px; height: 26px; border-radius: 50%;
    background: #EF9F27; display: flex; align-items: center; justify-content: center;
  }
  .title-main { font-size: 14px; font-weight: 600; color: #412402; }
  .title-sub { font-size: 9px; color: #BA7517; margin-top: 1px; }

  .hero-numbers {
    display: flex;
    gap: 8px;
  }
  .hero-card {
    flex: 1;
    border-radius: 10px;
    padding: 14px 12px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s;
    position: relative;
    overflow: hidden;
  }
  .hero-card:active { transform: scale(0.97); }
  .hero-card.current {
    background: rgba(250,231,199,0.8);
    border: 0.5px solid #F5B942;
  }
  .hero-card.target {
    background: rgba(240,153,123,0.35);
    border: 0.5px solid #F0997B;
  }
  .hero-card.gap {
    background: rgba(255,255,255,0.65);
    border: 0.5px solid #F5C4B3;
  }
  .hero-card .label { font-size: 9px; color: #854F0B; margin-bottom: 4px; }
  .hero-card .number {
    font-size: 22px; font-weight: 600; line-height: 1;
  }
  .hero-card.current .number { color: #F5B942; }
  .hero-card.target .number { color: #D85A30; }
  .hero-card.gap .number { color: #993C1D; }
  .hero-card .unit { font-size: 10px; color: #BA7517; margin-top: 2px; }
  .hero-card .sub { font-size: 8px; color: #BA7517; margin-top: 4px; }

  .progress-section {
    background: rgba(255,255,255,0.55);
    border: 0.5px solid #F5C4B3;
    border-radius: 10px;
    padding: 14px 16px;
  }
  .progress-label { font-size: 10px; color: #854F0B; margin-bottom: 8px; }
  .progress-track {
    position: relative;
    height: 32px;
    background: rgba(200,190,180,0.15);
    border-radius: 16px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 16px;
    background: linear-gradient(90deg, #FAC775, #F5B942, #EF9F27);
    width: 0%;
    transition: width 1.2s cubic-bezier(0.25,0.46,0.45,0.94);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 70px;
  }
  .progress-fill-text {
    font-size: 11px; font-weight: 600; color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    white-space: nowrap;
  }
  .progress-marker {
    position: absolute;
    top: -6px;
    height: 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 2;
  }
  .progress-marker .dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 2px solid;
  }
  .progress-marker .mtext {
    font-size: 7px; color: #854F0B; white-space: nowrap; margin-top: 2px;
  }
  .marker-current { left: 36.8%; }
  .marker-current .dot { background: #EF9F27; border-color: #412402; }
  .marker-target { left: 100%; transform: translateX(-50%); }
  .marker-target .dot { background: #D85A30; border-color: #412402; }
  .progress-gap-label {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 10px;
    color: #993C1D;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.5s 1s;
  }

  .progress-legend {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 9px;
    color: #854F0B;
  }

  .coverage-info {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(250,231,199,0.55);
    border: 0.5px solid #F5B942;
    border-radius: 10px;
    padding: 10px 14px;
  }
  .coverage-icon {
    width: 36px; height: 36px; position: relative;
  }
  .coverage-text {
    font-size: 10px; color: #664400; line-height: 1.5;
  }
  .coverage-text b { color: #D85A30; }

  .heatmap-section {
    background: rgba(255,255,255,0.55);
    border: 0.5px solid #F5C4B3;
    border-radius: 10px;
    padding: 10px 14px;
  }
  .heatmap-title {
    font-size: 10px; font-weight: 500; color: #412402;
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .heatmap-dot {
    width: 6px; height: 6px; border-radius: 50%;
    display: inline-block;
  }
  .heatmap-canvas-wrap {
    position: relative;
    width: 100%;
    height: 120px;
    border-radius: 6px;
    overflow: hidden;
  }
  .heatmap-tip {
    position: absolute;
    background: rgba(65,36,2,0.88);
    color: #fff;
    font-size: 8px;
    padding: 4px 8px;
    border-radius: 4px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 10;
  }

  .footer { font-size: 8px; color: #BA7517; text-align: center; }
</style>
</head>
<body>

<div class="title-row">
  <div class="title-icon">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
      <path d="M8 2C4.7 2 2 4.7 2 8s2.7 6 6 6 6-2.7 6-6-2.7-6-6-6z" stroke="#fff" stroke-width="1.5" fill="none"/>
      <path d="M8 5v3.5l2.5 1.2" stroke="#fff" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    </svg>
  </div>
  <div>
    <div class="title-main">爱心驿站覆盖缺口</div>
    <div class="title-sub">现有数量 vs 500米覆盖半径理想目标</div>
  </div>
</div>

<div class="hero-numbers">
  <div class="hero-card current" onclick="pulseCard(this)">
    <div class="label">现有数量</div>
    <div class="number" id="animNum1">0</div>
    <div class="unit">万个</div>
    <div class="sub">爱心驿站</div>
  </div>
  <div class="hero-card target" onclick="pulseCard(this)">
    <div class="label">理想目标</div>
    <div class="number" id="animNum2">0</div>
    <div class="unit">万个</div>
    <div class="sub">500米覆盖半径</div>
  </div>
  <div class="hero-card gap" onclick="pulseCard(this)">
    <div class="label">缺口</div>
    <div class="number" id="animNum3">0</div>
    <div class="unit">万个</div>
    <div class="sub" style="color:#D85A30;">缺口约 63%</div>
  </div>
</div>

<div class="progress-section">
  <div class="progress-label">覆盖率进度 · 18.42万 / 50万 = <b style="color:#EF9F27;">36.8%</b></div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill">
      <span class="progress-fill-text">18.42万</span>
    </div>
    <div class="progress-marker marker-current">
      <div class="dot"></div>
      <div class="mtext">现有</div>
    </div>
    <div class="progress-marker marker-target">
      <div class="dot"></div>
      <div class="mtext">50万目标</div>
    </div>
    <div class="progress-gap-label" id="gapLabel">缺口 63%</div>
  </div>
  <div class="progress-legend">
    <span style="color:#EF9F27;">█ 已覆盖</span>
    <span style="color:rgba(200,190,180,0.4);">░ 缺口</span>
  </div>
</div>

<div class="coverage-info">
  <div class="coverage-icon">
    <svg width="36" height="36" viewBox="0 0 36 36">
      <circle cx="18" cy="18" r="14" fill="none" stroke="#F5B942" stroke-width="1" stroke-dasharray="3,2"/>
      <circle cx="18" cy="18" r="6" fill="#F5B942" opacity="0.5"/>
      <circle cx="18" cy="18" r="3" fill="#EF9F27"/>
      <text x="18" y="26" font-size="7" fill="#664400" text-anchor="middle" font-family="sans-serif">500m</text>
    </svg>
  </div>
  <div class="coverage-text">
    以全国主要城市面积估算，达到<b>500米</b>服务半径<br>至少需要<b>50万个</b>爱心驿站，目前仅覆盖<b>36.8%</b>
  </div>
</div>

<div class="heatmap-section" id="heatmapSection">
  <div class="heatmap-title">
    <span class="heatmap-dot" style="background:#EF9F27;"></span>
    典型城市驿站分布密度 · 悬停查看区域详情
  </div>
  <div class="heatmap-canvas-wrap">
    <canvas id="heatmapCanvas" width="360" height="120"></canvas>
    <div class="heatmap-tip" id="heatmapTip"></div>
  </div>
</div>

<div class="footer">数据来源：原稿数据 · 全国主要城市面积估算</div>

<script>
function pulseCard(el) {
  el.style.transform = 'scale(0.96)';
  setTimeout(function() { el.style.transform = 'scale(1)'; }, 150);
}

// 数字滚动动画
function animateNumber(el, target, suffix) {
  var start = 0;
  var duration = 1200;
  var startTime = null;
  function step(ts) {
    if (!startTime) startTime = ts;
    var progress = Math.min((ts - startTime) / duration, 1);
    var eased = 1 - Math.pow(1 - progress, 3);
    var current = (target * eased).toFixed(2);
    el.textContent = current + (suffix || '');
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

setTimeout(function() {
  animateNumber(document.getElementById('animNum1'), 18.42, '');
  animateNumber(document.getElementById('animNum2'), 50, '');
  animateNumber(document.getElementById('animNum3'), 31.58, '');
}, 300);

// 进度条动画
setTimeout(function() {
  document.getElementById('progressFill').style.width = '36.8%';
  document.getElementById('gapLabel').style.opacity = '1';
}, 600);

// 热力图绘制
var hmCanvas = document.getElementById('heatmapCanvas');
var hmCtx = hmCanvas.getContext('2d');
var hmTip = document.getElementById('heatmapTip');

// 模拟城市网格 12x4
var gridW = 12, gridH = 4;
var cellW = 30, cellH = 30;

// 热力值：0=无覆盖(灰), 1=低(浅橙), 2=中(橙), 3=高(深橙)
var heatData = [
  [2,3,2,1,0,0,1,2,3,2,1,0],
  [1,3,3,2,1,0,0,1,2,3,2,1],
  [0,1,2,3,2,1,0,0,1,2,3,2],
  [0,0,1,2,3,2,1,0,0,1,2,1]
];

var heatColors = {
  0: 'rgba(180,175,170,0.15)',
  1: 'rgba(250,199,117,0.35)',
  2: 'rgba(239,159,39,0.55)',
  3: 'rgba(216,90,48,0.7)'
};

var heatLabels = {
  0: '覆盖盲区',
  1: '低覆盖',
  2: '中等覆盖',
  3: '高覆盖'
};

// 驿站位置点（模拟）
var stations = [
  {x:1,y:0},{x:2,y:0},{x:7,y:0},{x:8,y:0},
  {x:1,y:1},{x:2,y:1},{x:3,y:1},{x:7,y:1},{x:8,y:1},
  {x:2,y:2},{x:3,y:2},{x:4,y:2},{x:8,y:2},{x:9,y:2},
  {x:3,y:3},{x:4,y:3},{x:9,y:3},{x:10,y:3}
];

function drawHeatmap() {
  hmCtx.clearRect(0, 0, 360, 120);

  // 绘制网格背景色
  for (var r = 0; r < gridH; r++) {
    for (var c = 0; c < gridW; c++) {
      var val = heatData[r][c];
      hmCtx.fillStyle = heatColors[val];
      hmCtx.fillRect(c * cellW, r * cellH, cellW, cellH);
    }
  }

  // 网格线
  hmCtx.strokeStyle = 'rgba(255,255,255,0.3)';
  hmCtx.lineWidth = 0.5;
  for (var r = 0; r <= gridH; r++) {
    hmCtx.beginPath();
    hmCtx.moveTo(0, r * cellH);
    hmCtx.lineTo(gridW * cellW, r * cellH);
    hmCtx.stroke();
  }
  for (var c = 0; c <= gridW; c++) {
    hmCtx.beginPath();
    hmCtx.moveTo(c * cellW, 0);
    hmCtx.lineTo(c * cellW, gridH * cellH);
    hmCtx.stroke();
  }

  // 驿站图标
  stations.forEach(function(s) {
    var cx = s.x * cellW + cellW / 2;
    var cy = s.y * cellH + cellH / 2;
    // 驿站圆点
    hmCtx.beginPath();
    hmCtx.arc(cx, cy, 4, 0, 2 * Math.PI);
    hmCtx.fillStyle = '#F5B942';
    hmCtx.fill();
    hmCtx.strokeStyle = '#412402';
    hmCtx.lineWidth = 1;
    hmCtx.stroke();
    // 500米覆盖圈
    hmCtx.beginPath();
    hmCtx.arc(cx, cy, 12, 0, 2 * Math.PI);
    hmCtx.strokeStyle = 'rgba(239,159,39,0.4)';
    hmCtx.lineWidth = 1;
    hmCtx.setLineDash([3, 2]);
    hmCtx.stroke();
    hmCtx.setLineDash([]);
  });

  // 标注盲区
  hmCtx.font = '8px sans-serif';
  hmCtx.fillStyle = 'rgba(99,60,0,0.5)';
  hmCtx.fillText('盲区', 4.5 * cellW + 5, 0.5 * cellH + 8);
  hmCtx.fillText('盲区', 5.5 * cellW + 5, 1.5 * cellH + 8);
  hmCtx.fillText('盲区', 5.5 * cellW + 5, 2.5 * cellH + 8);
  hmCtx.fillText('盲区', 4.5 * cellW + 5, 3.5 * cellH + 8);

  // 边框
  hmCtx.strokeStyle = '#F5C4B3';
  hmCtx.lineWidth = 0.5;
  hmCtx.strokeRect(0, 0, gridW * cellW, gridH * cellH);
}

drawHeatmap();

// 热力图悬停
var hmWrap = document.querySelector('.heatmap-canvas-wrap');
hmWrap.addEventListener('mousemove', function(e) {
  var rect = hmCanvas.getBoundingClientRect();
  var x = e.clientX - rect.left;
  var y = e.clientY - rect.top;
  var col = Math.floor(x / cellW);
  var row = Math.floor(y / cellH);

  if (col >= 0 && col < gridW && row >= 0 && row < gridH) {
    var val = heatData[row][col];
    var label = heatLabels[val];
    hmTip.textContent = '区域(' + (col+1) + ',' + (row+1) + ') · ' + label + ' · 覆盖等级 ' + val;
    hmTip.style.opacity = '1';
    hmTip.style.left = (x + 10) + 'px';
    hmTip.style.top = (y - 20) + 'px';
  } else {
    hmTip.style.opacity = '0';
  }
});

hmWrap.addEventListener('mouseleave', function() {
  hmTip.style.opacity = '0';
});
</script>
</body>
</html>
